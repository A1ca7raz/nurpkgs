name: "Package builder"

on:
  workflow_dispatch:
    inputs:
      output:
        description: "Flake output (packages|legacyPackages|checks)"
        required: true
        default: packages
        type: choice
        options:
          - packages
          - legacyPackages
          - checks
      package:
        description: Package to build
        required: false
        type: string
      arch:
        description: Architecture
        required: true
        default: x86_64-linux
        type: choice
        options:
          - x86_64-linux
      push_cache:
        description: Push cache
        required: true
        default: true
        type: boolean
      pre_check:
        description: Check evaluation
        required: true
        default: true
        type: boolean
  workflow_call:
    inputs:
      output:
        description: "Flake output (packages|legacyPackages|checks)"
        default: "packages"
        type: string
      package:
        description: Package to build
        required: false
        type: string
      arch:
        description: Architecture
        default: x86_64-linux
        type: string
      push_cache:
        description: Push cache
        default: true
        type: boolean
      pre_check:
        description: Check evaluation
        default: false
        type: boolean

env:
  nix_conf: |
    keep-env-derivations = true
    keep-outputs = true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    env:
      CI_MODE: 1
      CACHIX_CACHE: ${{ secrets.CACHIX_CACHE }}
      CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_ACCESS_TOKEN }}

    steps:
    - name: 0-1. Checkout repository
      uses: actions/checkout@v6

    - name: 0-2. Install Nix
      uses: nixbuild/nix-quick-install-action@v34
      with:
        nix_conf: ${{ env.nix_conf }}

    - name: 0.3. Setup cache
      uses: nix-community/cache-nix-action@v7
      with:
        primary-key: nur-${{ runner.os }}-individual-${{ inputs.package }}-${{ hashFiles('flake.lock', 'pkgs/_sources/generated.nix') }}
        restore-prefixes-first-match: nur-${{ runner.os }}-shared-${{ hashFiles('flake.lock', 'pkgs/_sources/generated.nix') }}
        gc-max-store-size-linux: 1G
        purge: true
        purge-prefixes: nur-${{ runner.os }}-individual-${{ inputs.package }}-
        purge-created: 0
        purge-primary-key: never

    - name: 0-4. Setup Cachix
      uses: cachix/cachix-action@v17
      with:
        name: '${{ secrets.CACHIX_CACHE }}'
        authToken: '${{ secrets.CACHIX_ACCESS_TOKEN }}'
        skipPush: true

    - name: 1-1. Show flake metadata
      if: inputs.pre_check
      run: nix flake metadata

    - name: 1-2. Show flake information
      if: inputs.pre_check
      run: nix flake show

    - name: 1-3. Check evaluation
      if: inputs.pre_check
      run: nix flake check --no-build --no-allow-import-from-derivation

    - name: 2-1. Build ${{ inputs.output }}.${{ inputs.package }}
      run: |
        nix build .#${{ inputs.output }}.${{ inputs.arch }}.${{ inputs.package }} -v --show-trace

    - name: 3-1. Push cache to Cachix
      if: inputs.push_cache
      run: |
        nix eval --raw .#${{ inputs.output }}.${{ inputs.arch }}.${{ inputs.package }}.drvPath > .buildpaths
        for n in $(seq 1 4); do
          cat .buildpaths | cachix push $CACHIX_CACHE
          [[ $? == 0 ]] && break
        done
        # bash ./.github/push_cache.sh "${{ inputs.output }}" "${{ inputs.arch }}" "${{ inputs.package }}"
